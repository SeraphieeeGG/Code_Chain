{% extends "base.html" %}
{% block title %}Edit Delivery - Cold-Chain Manager{% endblock %}
{% block content %}
<div class="row mb-4">
    <div class="col">
        <h1><i class="bi bi-pencil"></i> Edit Delivery #{{ delivery.delivery_id }}</h1>
        <p class="text-muted">Update delivery information</p>
    </div>
</div>

<div class="row">
    <div class="col-md-8">
        <div class="card">
            <div class="card-body">
                <form method="post">
                    <div class="mb-3">
                        <label class="form-label">Batch</label>
                        <input type="text" class="form-control" value="#{{ delivery.batch_id }} - {{ delivery.batch.product.product_name }}" disabled>
                    </div>
                    <div class="mb-3">
                        <label for="destination" class="form-label">Destination <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="destination" name="destination" value="{{ delivery.destination }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="delivery_status" class="form-label">Delivery Status <span class="text-danger">*</span></label>
                        <select class="form-select" id="delivery_status" name="delivery_status" required>
                            <option value="Pending" {% if delivery.delivery_status == 'Pending' %}selected{% endif %}>Pending</option>
                            <option value="In Transit" {% if delivery.delivery_status == 'In Transit' %}selected{% endif %}>In Transit</option>
                            <option value="Delivered" {% if delivery.delivery_status == 'Delivered' %}selected{% endif %}>Delivered</option>
                            <option value="Cancelled" {% if delivery.delivery_status == 'Cancelled' %}selected{% endif %}>Cancelled</option>
                        </select>
                    </div>
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('deliveries.list_deliveries') }}" class="btn btn-secondary">Cancel</a>
                        <button type="submit" class="btn btn-primary">Update Delivery</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
