{% extends 'base.html' %}
{% block title %}Register – Cold-Chain Manager{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">

    <div class="card shadow-sm mt-4">
      <div class="card-body p-4">

        <h4 class="card-title text-center mb-4">
          <i class="bi bi-person-plus text-primary"></i> Create Account
        </h4>

        <form method="POST" action="{{ url_for('auth.register') }}" novalidate>

          <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-person"></i></span>
              <input type="text" id="username" name="username"
                     class="form-control" placeholder="Choose a username"
                     required autofocus autocomplete="username">
            </div>
          </div>

          <div class="mb-3">
            <label for="email" class="form-label">Email address</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-envelope"></i></span>
              <input type="email" id="email" name="email"
                     class="form-control" placeholder="you@example.com"
                     required autocomplete="email">
            </div>
          </div>

          <div class="mb-3">
            <label for="role" class="form-label">Role</label>
            <select id="role" name="role" class="form-select">
              <option value="staff"   selected>Staff</option>
              <option value="manager">Manager</option>
              <option value="admin">Admin</option>
            </select>
          </div>

          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input type="password" id="password" name="password"
                     class="form-control" placeholder="Min 8 characters"
                     required autocomplete="new-password">
            </div>
          </div>

          <div class="mb-4">
            <label for="password2" class="form-label">Confirm Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
              <input type="password" id="password2" name="password2"
                     class="form-control" placeholder="Repeat password"
                     required autocomplete="new-password">
            </div>
          </div>

          <div class="d-grid">
            <button type="submit" class="btn btn-success">
              <i class="bi bi-person-check"></i> Register
            </button>
          </div>

        </form>

        <hr>
        <p class="text-center mb-0 small">
          Already have an account?
          <a href="{{ url_for('auth.login') }}">Log in here</a>
        </p>

      </div>
    </div>

  </div>
</div>
{% endblock %}
